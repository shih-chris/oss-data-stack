# dbt profiles configuration for DuckDB

oss_data_stack:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'storage/catalog.duckdb') }}"
      schema: main
      threads: 4

    prod:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'storage/catalog.duckdb') }}"
      schema: main
      threads: 8
